<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculateur VAE — Simulation Marketing</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-text-primary:      #111827;
      --color-text-secondary:    #6b7280;
      --color-text-danger:       #dc2626;
      --color-text-warning:      #b45309;
      --color-text-success:      #16a34a;
      --color-background-primary:   #ffffff;
      --color-background-secondary: #f9fafb;
      --color-background-danger:    #fef2f2;
      --color-background-warning:   #fffbeb;
      --color-background-success:   #f0fdf4;
      --color-border-tertiary:  #e5e7eb;
      --color-border-danger:    #fca5a5;
      --color-border-warning:   #fcd34d;
      --color-border-success:   #86efac;
      --border-radius-lg: 12px;
      --border-radius-md:  8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: #f3f4f6;
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    header span.icon { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; color: #94a3b8; }

    main { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

    select, input[type="range"] {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid var(--color-border-tertiary);
      border-radius: 6px;
      padding: 6px 8px;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    input[type="range"] {
      padding: 0;
      border: none;
      cursor: pointer;
      accent-color: #6366f1;
    }
  </style>
</head>
<body>

<header>
  <span class="icon">🚲</span>
  <div>
    <h1>Calculateur VAE — Simulation Marketing</h1>
    <p>Marché canadien fictif · Outil de décision rapide</p>
  </div>
</header>

<main id="root"></main>

<script type="text/babel">
const { useState, useMemo } = React;

const SEGMENTS = {
  "Urbains Pressés":           { share: 0.30, demandBase: 36000 },
  "Prudentes Confort":         { share: 0.15, demandBase: 18000 },
  "Endurants Performants":     { share: 0.20, demandBase: 24000 },
  "Nomades Multimodaux":       { share: 0.10, demandBase: 12000 },
  "Familles Cargo":            { share: 0.15, demandBase: 18000 },
  "Aventuriers Tout-terrain":  { share: 0.10, demandBase: 12000 },
};

const GAMMES = {
  "Entrée de gamme": { min: 2835, max: 4355, marge: 1000, cogs: 0.60 },
  "Milieu de gamme": { min: 3895, max: 5500, marge: 1300, cogs: 0.57 },
  "Haut de gamme":   { min: 5485, max: 6505, marge: 1700, cogs: 0.55 },
};
// Coherence price threshold: warning at 10%, error at 20% outside range
const PRICE_WARN_PCT  = 0.10;
const PRICE_ERROR_PCT = 0.20;

const FIRMES = ["TRE","AVE","VEL","CAN","GIA","PED","RID","SUR","EBI"];
const BUDGET_MAX = 500000;

const fmt = (n) => n.toLocaleString("fr-CA", { style: "currency", currency: "CAD", maximumFractionDigits: 0 });
const pct = (n) => (n * 100).toFixed(1) + "%";

function App() {
  const [firme,      setFirme]      = useState("TRE");
  const [segment,    setSegment]    = useState("Urbains Pressés");
  const [gamme,      setGamme]      = useState("Milieu de gamme");
  const [prix,       setPrix]       = useState(3895);
  const [production, setProduction] = useState(3000);
  const [marketing,  setMarketing]  = useState(80000);
  const [rd,         setRd]         = useState(40000);
  const [durab,      setDurab]      = useState(0);
  const [periode,    setPeriode]    = useState(1);

  const seg = SEGMENTS[segment];
  const g   = GAMMES[gamme];

  const croissance    = Math.pow(1.12, periode);
  const demandSegment = Math.round(seg.demandBase * croissance);
  const pdmBase       = 1 / 9;
  const mktBoost      = Math.min(marketing / 500000, 0.15);
  const rdBoost       = Math.min(rd / 300000, 0.05);
  const demandFirme   = Math.round(demandSegment * (pdmBase + mktBoost + rdBoost));

  const ventes    = Math.min(production, demandFirme);
  const ca        = ventes * prix;
  const coutProd  = (prix - g.marge) * ventes;
  const depenses  = marketing + rd + durab;
  const profit    = ca - coutProd - depenses;
  const marge     = ca > 0 ? profit / ca : 0;
  const pdm       = demandSegment > 0 ? ventes / demandSegment : 0;
  const tauxVente = production > 0 ? ventes / production : 0;
  const poidsMkt  = ca > 0 ? marketing / ca : 0;

  const alertes = useMemo(() => {
    const a = [];
    if (prix < g.min || prix > g.max) {
      const deviation = prix < g.min
        ? (g.min - prix) / g.min
        : (prix - g.max) / g.max;
      const priceSeverity = deviation > PRICE_ERROR_PCT ? "danger" : "warn";
      a.push({
        type: priceSeverity,
        msg: `Prix (${fmt(prix)}) ${deviation > PRICE_ERROR_PCT ? "très incohérent" : "légèrement incohérent"} avec la gamme "${gamme}" (recommandé : ${fmt(g.min)} – ${fmt(g.max)}, écart ${(deviation*100).toFixed(0)}%).`
      });
    }
    if (marge < 0.02)
      a.push({ type: "danger", msg: `Marge trop faible (${pct(marge)}) — minimum requis : 2 %. Zone cible : 5–10 %.` });
    else if (marge < 0.05)
      a.push({ type: "warn", msg: `Marge (${pct(marge)}) sous la zone cible (5–10 %). Revoir le prix ou les coûts.` });
    if (poidsMkt > 0.10)
      a.push({ type: "warn", msg: `Marketing élevé (${pct(poidsMkt)} du CA) — cible ROI : 0–10 % du CA.` });
    if (tauxVente < 0.70)
      a.push({ type: "warn", msg: `Surproduction : seulement ${pct(tauxVente)} des unités vendues — ${(production - ventes).toLocaleString()} unités non écoulées.` });
    if (tauxVente > 0.95 && production < demandFirme)
      a.push({ type: "warn", msg: `Risque de rupture : demande estimée ${demandFirme.toLocaleString()} unités, production ${production.toLocaleString()} (${pct(tauxVente)} couvert).` });
    if (profit < 0)
      a.push({ type: "danger", msg: `Profit négatif (${fmt(profit)}) — réduire les coûts ou augmenter le prix.` });
    return a;
  }, [prix, marge, poidsMkt, tauxVente, profit, g, gamme, production, demandFirme, ventes]);

  const statut      = alertes.some(a => a.type === "danger") ? "DANGER" : alertes.some(a => a.type === "warn") ? "ATTENTION" : "OK";
  const statutColor = statut === "DANGER" ? "var(--color-text-danger)"   : statut === "ATTENTION" ? "var(--color-text-warning)"   : "var(--color-text-success)";
  const statutBg    = statut === "DANGER" ? "var(--color-background-danger)" : statut === "ATTENTION" ? "var(--color-background-warning)" : "var(--color-background-success)";
  const statutBorder= statut === "DANGER" ? "var(--color-border-danger)"  : statut === "ATTENTION" ? "var(--color-border-warning)"  : "var(--color-border-success)";

  const row = (label, val, sub) => (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", padding:"6px 0", borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
      <span style={{ fontSize:13, color:"var(--color-text-secondary)" }}>{label}</span>
      <span style={{ fontSize:14, fontWeight:500 }}>{val} {sub && <span style={{ fontSize:12, color:"var(--color-text-secondary)", fontWeight:400 }}>{sub}</span>}</span>
    </div>
  );

  const slider = (label, val, setter, min, max, step, disp) => (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <label style={{ fontSize:13, color:"var(--color-text-secondary)" }}>{label}</label>
        <span style={{ fontSize:13, fontWeight:500 }}>{disp(val)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={val}
             onChange={e => setter(Number(e.target.value))} />
    </div>
  );

  const cardStyle = {
    background:"var(--color-background-primary)",
    border:"0.5px solid var(--color-border-tertiary)",
    borderRadius:"var(--border-radius-lg)",
    padding:"1rem 1.25rem",
  };

  return (
    <div style={{ padding:"1rem 0", fontFamily:"var(--font-sans)" }}>
      <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1fr) minmax(0,1.2fr)", gap:16 }}>

        {/* ── Left panel: Paramètres ── */}
        <div style={cardStyle}>
          <p style={{ fontSize:13, fontWeight:600, marginBottom:12, color:"var(--color-text-secondary)", textTransform:"uppercase", letterSpacing:"0.05em" }}>Paramètres</p>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
            <div>
              <label style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Firme</label>
              <select value={firme} onChange={e => setFirme(e.target.value)} style={{ marginTop:4 }}>
                {FIRMES.map(f => <option key={f}>{f}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Période</label>
              <select value={periode} onChange={e => setPeriode(Number(e.target.value))} style={{ marginTop:4 }}>
                {[1,2,3,4,5,6,7,8].map(p => <option key={p} value={p}>Période {p}</option>)}
              </select>
            </div>
          </div>

          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Segment cible</label>
            <select value={segment} onChange={e => setSegment(e.target.value)} style={{ marginTop:4 }}>
              {Object.keys(SEGMENTS).map(s => <option key={s}>{s}</option>)}
            </select>
            <p style={{ fontSize:11, color:"var(--color-text-secondary)", marginTop:4 }}>
              Demande P{periode} : {demandSegment.toLocaleString()} unités
            </p>
          </div>

          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Gamme</label>
            <select value={gamme} onChange={e => {
              setGamme(e.target.value);
              setPrix(GAMMES[e.target.value].min);
            }} style={{ marginTop:4 }}>
              {Object.keys(GAMMES).map(g => <option key={g}>{g}</option>)}
            </select>
            <p style={{ fontSize:11, color:"var(--color-text-secondary)", marginTop:4 }}>
              Fourchette : {fmt(g.min)} – {fmt(g.max)} · Marge cible : {fmt(g.marge)}/unité
            </p>
          </div>

          {slider("Prix de vente", prix, setPrix, g.min - 500, g.max + 500, 10, v => fmt(v))}
          {slider("Production (unités)", production, setProduction, 100, 15000, 100, v => v.toLocaleString())}
          {slider("Budget marketing", marketing, setMarketing, 0, BUDGET_MAX, 5000, v => fmt(v))}
          {slider("Budget R&D", rd, setRd, 0, 200000, 5000, v => fmt(v))}
          {slider("Durabilité", durab, setDurab, 0, 100000, 5000, v => fmt(v))}
        </div>

        {/* ── Right panel: Résultats ── */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

          {/* Statut */}
          <div style={{ background:statutBg, border:`0.5px solid ${statutBorder}`, borderRadius:"var(--border-radius-md)", padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ fontSize:13, fontWeight:500, color:statutColor }}>Statut global</span>
            <span style={{ fontSize:18, fontWeight:700, color:statutColor }}>{statut}</span>
          </div>

          {/* KPIs grid */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {[
              ["Chiffre d'affaires", fmt(ca)],
              ["Profit net",         fmt(profit)],
              ["Marge",              pct(marge)],
              ["PDM segment",        pct(pdm)],
              ["Taux de vente",      pct(tauxVente)],
              ["Mkt / CA",           pct(poidsMkt)],
            ].map(([l, v]) => (
              <div key={l} style={{ background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"10px 12px" }}>
                <p style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 4px" }}>{l}</p>
                <p style={{ fontSize:18, fontWeight:600, margin:0 }}>{v}</p>
              </div>
            ))}
          </div>

          {/* Détail financier */}
          <div style={cardStyle}>
            <p style={{ fontSize:13, fontWeight:600, marginBottom:10, color:"var(--color-text-secondary)", textTransform:"uppercase", letterSpacing:"0.05em" }}>Détail financier</p>
            {row("Ventes", ventes.toLocaleString() + " unités", `/ demande estimée ${demandFirme.toLocaleString()}`)}
            {row("Chiffre d'affaires", fmt(ca))}
            {row("Coût de production", fmt(coutProd))}
            {row("Marketing", fmt(marketing))}
            {row("R&D", fmt(rd))}
            {row("Durabilité", fmt(durab))}
            {row("Profit net", fmt(profit), marge >= 0.02 ? "✓" : "⚠")}
          </div>

          {/* Alertes */}
          {alertes.length > 0 ? (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {alertes.map((a, i) => (
                <div key={i} style={{
                  padding:"8px 12px",
                  borderRadius:"var(--border-radius-md)",
                  fontSize:12,
                  lineHeight:1.5,
                  background: a.type === "danger" ? "var(--color-background-danger)" : "var(--color-background-warning)",
                  color:      a.type === "danger" ? "var(--color-text-danger)"       : "var(--color-text-warning)",
                  border:`0.5px solid ${a.type === "danger" ? "var(--color-border-danger)" : "var(--color-border-warning)"}`,
                }}>
                  {a.type === "danger" ? "🔴" : "🟡"} {a.msg}
                </div>
              ))}
            </div>
          ) : (
            <div style={{ padding:"8px 12px", borderRadius:"var(--border-radius-md)", fontSize:12, background:"var(--color-background-success)", color:"var(--color-text-success)", border:"0.5px solid var(--color-border-success)" }}>
              ✅ Tous les indicateurs sont dans les seuils recommandés.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
